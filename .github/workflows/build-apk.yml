name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-pip \
            python3-dev \
            libffi-dev \
            libssl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline-dev \
            libsqlite3-dev \
            libbz2-dev \
            zlib1g-dev \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zip \
            unzip \
            wget \
            automake \
            libltdl-dev \
            cmake \
            libxml2-dev \
            libxslt1-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer virtualenv cython

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT/tools/bin
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -qq commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.1" "platforms;android-33" "platform-tools"
          
          buildozer android debug

      - name: Find APK files
        run: |
          echo "=== البحث عن جميع ملفات APK ==="
          find /home/runner -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=== محتويات مجلد bin ==="
          ls -la bin/ 2>/dev/null || echo "مجلد bin غير موجود"
          echo ""
          echo "=== محتويات مجلد .buildozer ==="
          ls -la .buildozer/ 2>/dev/null || echo "مجلد .buildozer غير موجود"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wps-generator-apk
          path: |
            bin/*.apk
            .buildozer/**/*.apk
            *.apk
