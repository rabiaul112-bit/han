name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with official Kivy Buildozer
        uses: kivy/buildozer-action@master
        with:
          spec_file: buildozer.spec

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wps-generator-apk
          path: bin/*.apk
