name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-pip \
            python3-dev \
            libffi-dev \
            libssl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline-dev \
            libsqlite3-dev \
            libbz2-dev \
            zlib1g-dev \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zip \
            unzip \
            wget \
            automake \
            libltdl-dev \
            cmake \
            libxml2-dev \
            libxslt1-dev \
            cython3

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer virtualenv

      - name: Build APK
        env:
          BUILD_DIR: ${{ github.workspace }}/.buildozer
        run: |
          export ANDROID_HOME="$BUILD_DIR/android/platform/android-sdk"
          buildozer android debug --verbose 2>&1 | tee buildozer.log
        continue-on-error: false

      - name: Show buildozer log on failure
        if: failure()
        run: |
          cat buildozer.log || true
          echo "--- END OF LOG ---"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wps-generator-apk
          path: bin/*.apk
